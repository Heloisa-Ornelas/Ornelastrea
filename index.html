<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ornelas Advocacia - Sistema de Gestão</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
        }

        /* Tela de login */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .login-container h1 {
            color: #ffd700;
            margin-bottom: 30px;
            text-align: center;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 16px;
            background: #2a2a2a;
            color: white;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        .login-container button:hover {
            background: #ffed4a;
        }

        .error {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
        }

        /* Sistema principal */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: none;
            border: 1px solid #333;
        }

        .header {
            background: #000000;
            color: #ffd700;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }

        .header h2 {
            font-size: 24px;
        }

        .logout-btn {
            background: #333;
            border: none;
            color: #ffd700;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid #333;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            color: #ccc;
        }

        .tab.active {
            background: #1a1a1a;
            border-bottom: 3px solid #ffd700;
            color: #ffd700;
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .search-bar {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 16px;
            background: #2a2a2a;
            color: white;
        }

        .search-bar input::placeholder {
            color: #888;
        }

        .search-bar button {
            padding: 12px 24px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .add-btn {
            background: #00aa44;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .add-btn:hover {
            background: #008833;
        }

        /* CARDS - novo estilo para pessoas */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #ffd700;
            transform: translateX(5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-nome {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }

        .card-tipo {
            background: #333;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ffd700;
        }

        .card-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            color: #ddd;
            font-size: 14px;
        }

        .info-label {
            color: #888;
            font-size: 12px;
            margin-right: 8px;
        }

        .info-value {
            color: white;
            font-weight: 500;
        }

        .card-acoes {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 1px solid #333;
            padding-top: 15px;
            margin-top: 5px;
        }

        .edit-btn, .delete-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .edit-btn {
            background: #ffc107;
            color: #000;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        /* TABELAS para processos e honorários */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
            color: #ddd;
        }

        th {
            background: #0a0a0a;
            font-weight: bold;
            color: #ffd700;
        }

        tr:hover {
            background: #2a2a2a;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #ffd700;
        }

        .modal-content h3 {
            color: #ffd700;
            margin-bottom: 20px;
        }

        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: white;
        }

        .modal-content input::placeholder {
            color: #888;
        }

        .modal-content label {
            color: #ffd700;
            display: block;
            margin-top: 10px;
        }

        .timeline {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .timeline-item {
            padding: 10px;
            border-left: 3px solid #ffd700;
            margin-left: 20px;
            margin-bottom: 10px;
            color: #ddd;
        }

        .sucesso {
            background: #00aa44;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            display: none;
        }

        .empty-message {
            color: #888;
            text-align: center;
            padding: 40px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .tabs {
                flex-wrap: wrap;
            }
            .card-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Tela de Login -->
    <div class="login-container" id="loginScreen">
        <h1>⚖️ Ornelas Advocacia</h1>
        <input type="password" id="passwordInput" placeholder="Digite a senha de acesso" autocomplete="off">
        <button onclick="login()">Acessar Sistema</button>
        <div class="error" id="loginError"></div>
    </div>

    <!-- Mensagem de sucesso -->
    <div class="sucesso" id="msgSucesso">✅ Salvo com sucesso!</div>

    <!-- Sistema Principal -->
    <div class="main-container" id="mainScreen">
        <div class="header">
            <h2>⚖️ Ornelas Advocacia - Gestão de Processos</h2>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="pessoas">👥 Pessoas</div>
            <div class="tab" data-tab="processos">📋 Processos</div>
            <div class="tab" data-tab="honorarios">💰 Honorários</div>
            <div class="tab" data-tab="vencimentos">📅 Vencimentos</div>
        </div>

        <!-- Aba Pessoas -->
        <div class="tab-content active" id="tabPessoas">
            <div class="search-bar">
                <input type="text" id="searchPessoas" placeholder="Pesquisar por nome, CPF/CNPJ...">
                <button onclick="searchPessoas()">🔍 Pesquisar</button>
                <button class="add-btn" onclick="openModal('pessoa')">+ Nova Pessoa</button>
            </div>
            <div id="pessoasList"></div>
        </div>

        <!-- Aba Processos -->
        <div class="tab-content" id="tabProcessos">
            <div class="search-bar">
                <input type="text" id="searchProcessos" placeholder="Pesquisar por número do processo, cliente...">
                <button onclick="searchProcessos()">🔍 Pesquisar</button>
                <button class="add-btn" onclick="openModal('processo')">+ Novo Processo</button>
            </div>
            <div id="processosList"></div>
        </div>

        <!-- Aba Honorários -->
        <div class="tab-content" id="tabHonorarios">
            <div class="search-bar">
                <input type="text" id="searchHonorarios" placeholder="Pesquisar por cliente...">
                <button onclick="searchHonorarios()">🔍 Pesquisar</button>
                <button class="add-btn" onclick="openModal('honorario')">+ Lançar Honorário</button>
            </div>
            <div id="honorariosList"></div>
        </div>

        <!-- Aba Vencimentos -->
        <div class="tab-content" id="tabVencimentos">
            <div id="vencimentosList"></div>
        </div>
    </div>

    <!-- Modal Genérico -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
            <button onclick="closeModal()" style="margin-top: 15px; padding: 8px 16px; background:#333; color:white; border:none; border-radius:6px; cursor:pointer;">Cancelar</button>
            <button onclick="saveModal()" style="margin-top: 15px; padding: 8px 16px; background: #00aa44; color: white; border: none; border-radius: 6px; cursor:pointer;">Salvar</button>
        </div>
    </div>

    <script>
        // SENHA
        const SENHA = "heloisa01";

        // DADOS
        let dados = {
            pessoas: [],
            processos: [],
            honorarios: [],
            timeline: []
        };

        let currentEditId = null;
        let currentModalType = null;

        // FUNÇÕES DE FORMATAÇÃO AUTOMÁTICA
        function formatarCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            if (cpf.length === 11) {
                return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            }
            return cpf;
        }

        function formatarCNPJ(cnpj) {
            cnpj = cnpj.replace(/\D/g, '');
            if (cnpj.length === 14) {
                return cnpj.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
            }
            return cnpj;
        }

        function formatarTelefone(telefone) {
            telefone = telefone.replace(/\D/g, '');
            if (telefone.length === 11) {
                return telefone.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            } else if (telefone.length === 10) {
                return telefone.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            }
            return telefone;
        }

        function formatarDocumento(documento, tipo) {
            let apenasNumeros = documento.replace(/\D/g, '');
            if (tipo === "Física" && apenasNumeros.length === 11) {
                return formatarCPF(documento);
            } else if (tipo === "Jurídica" && apenasNumeros.length === 14) {
                return formatarCNPJ(documento);
            }
            return documento;
        }

        function formatarContato(contato) {
            if (!contato) return '';
            return formatarTelefone(contato);
        }

        function mostrarSucesso() {
            const msg = document.getElementById("msgSucesso");
            msg.style.display = "block";
            setTimeout(() => {
                msg.style.display = "none";
            }, 2000);
        }

        function init() {
            carregarDados();
            if(dados.pessoas.length === 0) {
                dados.pessoas.push({ id: 1, nome: "João Silva", tipo: "Física", documento: "12345678900", contato: "11999999999" });
                dados.pessoas.push({ id: 2, nome: "Empresa XPTO", tipo: "Jurídica", documento: "12345678000190", contato: "1133334444" });
                
                dados.processos.push({ id: 1, numero: "1234/2024", clienteId: 1, status: "Em andamento", descricao: "Ação trabalhista" });
                dados.processos.push({ id: 2, numero: "5678/2024", clienteId: 2, status: "Arquivado", descricao: "Cobrança" });
                
                dados.honorarios.push({ id: 1, pessoaId: 1, valorTotal: 3000, parcelas: 3, parcelasPagas: 1, vencimentoDia: 27 });
                dados.honorarios.push({ id: 2, pessoaId: 2, valorTotal: 5000, parcelas: 10, parcelasPagas: 5, vencimentoDia: 15 });
                
                dados.timeline.push({ id: 1, processoId: 1, data: "2024-01-10", descricao: "Petição inicial protocolada" });
                dados.timeline.push({ id: 2, processoId: 1, data: "2024-02-15", descricao: "Citação realizada" });
                
                salvarDados();
            }
            renderizarTudo();
        }

        function carregarDados() {
            const saved = localStorage.getItem("ornelas_advocacia");
            if(saved) {
                dados = JSON.parse(saved);
            }
        }

        function salvarDados() {
            localStorage.setItem("ornelas_advocacia", JSON.stringify(dados));
            mostrarSucesso();
        }

        function login() {
            const senha = document.getElementById("passwordInput").value;
            if(senha === SENHA) {
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("mainScreen").style.display = "block";
                init();
            } else {
                document.getElementById("loginError").innerText = "Senha incorreta!";
            }
        }

        function logout() {
            document.getElementById("loginScreen").style.display = "block";
            document.getElementById("mainScreen").style.display = "none";
            document.getElementById("passwordInput").value = "";
        }

        // Abas
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById(`tab${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`).classList.add('active');
                renderizarTudo();
            });
        });

        function renderizarTudo() {
            renderizarPessoas();
            renderizarProcessos();
            renderizarHonorarios();
            renderizarVencimentos();
        }

        function getPessoaNome(id) {
            const pessoa = dados.pessoas.find(p => p.id == id);
            return pessoa ? pessoa.nome : "N/A";
        }

        // RENDERIZAR PESSOAS EM CARDS (sem cabeçalho de tabela)
        function renderizarPessoas(filtro = "") {
            let lista = dados.pessoas;
            if(filtro) {
                lista = lista.filter(p => p.nome.toLowerCase().includes(filtro.toLowerCase()) || p.documento.includes(filtro));
            }
            
            if(lista.length === 0) {
                document.getElementById("pessoasList").innerHTML = '<div class="empty-message">Nenhuma pessoa cadastrada. Clique em "+ Nova Pessoa" para começar.</div>';
                return;
            }
            
            let html = '<div class="cards-container">';
            lista.forEach(p => {
                const processos = dados.processos.filter(pr => pr.clienteId == p.id);
                const honorarios = dados.honorarios.filter(h => h.pessoaId == p.id);
                const totalDevido = honorarios.reduce((acc, h) => acc + ((h.valorTotal / h.parcelas) * (h.parcelas - h.parcelasPagas)), 0);
                
                // Aplicar formatação ao exibir
                const docFormatado = formatarDocumento(p.documento, p.tipo);
                const contatoFormatado = formatarContato(p.contato);
                
                html += `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-nome">👤 ${p.nome}</span>
                            <span class="card-tipo">${p.tipo}</span>
                        </div>
                        <div class="card-info">
                            <div class="info-item">
                                <span class="info-label">📄 Documento:</span>
                                <span class="info-value">${docFormatado}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">📞 Contato:</span>
                                <span class="info-value">${contatoFormatado || '-'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">⚖️ Processos:</span>
                                <span class="info-value">${processos.map(pr => pr.numero).join(', ') || 'Nenhum'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">💰 Honorários Devidos:</span>
                                <span class="info-value">R$ ${totalDevido.toFixed(2)}</span>
                            </div>
                        </div>
                        <div class="card-acoes">
                            <button class="edit-btn" onclick="editarPessoa(${p.id})">✏️ Editar</button>
                            <button class="delete-btn" onclick="excluirPessoa(${p.id})">🗑️ Excluir</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById("pessoasList").innerHTML = html;
        }

        function renderizarProcessos(filtro = "") {
            let lista = dados.processos;
            if(filtro) {
                lista = lista.filter(p => p.numero.includes(filtro) || getPessoaNome(p.clienteId).toLowerCase().includes(filtro.toLowerCase()));
            }
            
            if(lista.length === 0) {
                document.getElementById("processosList").innerHTML = '<div class="empty-message">Nenhum processo cadastrado. Clique em "+ Novo Processo" para começar.</div>';
                return;
            }
            
            let html = '<table><tr><th>Número</th><th>Cliente</th><th>Status</th><th>Descrição</th><th>Linha do Tempo</th><th>Ações</th></tr>';
            lista.forEach(p => {
                const timeline = dados.timeline.filter(t => t.processoId == p.id);
                html += `<tr>
                    <td>${p.numero}</td>
                    <td>${getPessoaNome(p.clienteId)}</td>
                    <td>${p.status}</td>
                    <td>${p.descricao}</td>
                    <td><button class="edit-btn" onclick="verTimeline(${p.id})">📜 Ver (${timeline.length})</button></td>
                    <td>
                        <button class="edit-btn" onclick="editarProcesso(${p.id})">✏️</button>
                        <button class="delete-btn" onclick="excluirProcesso(${p.id})">🗑️</button>
                    </td>
                </tr>`;
            });
            html += '</table>';
            document.getElementById("processosList").innerHTML = html;
        }

        function renderizarHonorarios(filtro = "") {
            let lista = dados.honorarios;
            if(filtro) {
                lista = lista.filter(h => getPessoaNome(h.pessoaId).toLowerCase().includes(filtro.toLowerCase()));
            }
            
            if(lista.length === 0) {
                document.getElementById("honorariosList").innerHTML = '<div class="empty-message">Nenhum honorário cadastrado. Clique em "+ Lançar Honorário" para começar.</div>';
                return;
            }
            
            let html = 'ables style="width:100%">\n<thead>\n<th>Cliente</th><th>Valor Total</th><th>Parcelas</th><th>Pagas</th><th>Valor Parcela</th><th>Saldo Devedor</th><th>Vencimento</th><th>Ações</th>\n</thead>\n<tbody>';
            lista.forEach(h => {
                const valorParcela = h.valorTotal / h.parcelas;
                const saldo = valorParcela * (h.parcelas - h.parcelasPagas);
                html += `<tr>
                    <td>${getPessoaNome(h.pessoaId)}</td>
                    <td>R$ ${h.valorTotal.toFixed(2)}</td>
                    <td>${h.parcelas}</td>
                    <td>${h.parcelasPagas}</td>
                    <td>R$ ${valorParcela.toFixed(2)}</td>
                    <td><strong style="color:#ffd700;">R$ ${saldo.toFixed(2)}</strong></td>
                    <td>Dia ${h.vencimentoDia}</td>
                    <td>
                        <button class="edit-btn" onclick="editarHonorario(${h.id})">✏️</button>
                        <button class="delete-btn" onclick="excluirHonorario(${h.id})">🗑️</button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById("honorariosList").innerHTML = html;
        }

        function renderizarVencimentos() {
            const hoje = new Date();
            const diaAtual = hoje.getDate();
            
            let proximos = [];
            dados.honorarios.forEach(h => {
                const pessoa = dados.pessoas.find(p => p.id == h.pessoaId);
                if(pessoa) {
                    const valorParcela = h.valorTotal / h.parcelas;
                    const parcelasRestantes = h.parcelas - h.parcelasPagas;
                    if(parcelasRestantes > 0) {
                        let venceHoje = (h.vencimentoDia == diaAtual);
                        let venceProximos = (h.vencimentoDia >= diaAtual && h.vencimentoDia <= diaAtual + 7);
                        proximos.push({
                            cliente: pessoa.nome,
                            valor: valorParcela,
                            vencimentoDia: h.vencimentoDia,
                            parcelasRestantes: parcelasRestantes,
                            alerta: venceHoje ? "🔴 VENCE HOJE!" : (venceProximos ? "🟡 Vence em breve" : "🟢 Normal")
                        });
                    }
                }
            });
            
            let html = '<h3 style="color:#ffd700; margin-bottom:20px;">📅 Próximos Vencimentos</h3>';
            if(proximos.length === 0) {
                html += '<div class="empty-message">Nenhum vencimento pendente.</div>';
            } else {
                html += 'able style="width:100%">\n<thead>\n<th>Cliente</th><th>Valor da Parcela</th><th>Dia Vencimento</th><th>Parcelas Restantes</th><th>Alerta</th>\n</thead>\n<tbody>';
                proximos.forEach(p => {
                    let corFundo = p.alerta.includes("HOJE") ? "#8b0000" : (p.alerta.includes("breve") ? "#886600" : "transparent");
                    html += `<tr style="background: ${corFundo}">
                        <td>${p.cliente}</td>
                        <td>R$ ${p.valor.toFixed(2)}</td>
                        <td>Dia ${p.vencimentoDia}</td>
                        <td>${p.parcelasRestantes}</td>
                        <td>${p.alerta}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
            }
            document.getElementById("vencimentosList").innerHTML = html;
        }

        // CRUD e outras funções (mantidas iguais)
        function editarPessoa(id) {
            const pessoa = dados.pessoas.find(p => p.id == id);
            currentEditId = id;
            currentModalType = "pessoa";
            document.getElementById("modalTitle").innerText = "Editar Pessoa";
            document.getElementById("modalBody").innerHTML = `
                <label>Nome completo:</label>
                <input type="text" id="nome" value="${pessoa.nome}" placeholder="Nome">
                <label>Tipo:</label>
                <select id="tipo"><option ${pessoa.tipo=="Física"?"selected":""}>Física</option><option ${pessoa.tipo=="Jurídica"?"selected":""}>Jurídica</option></select>
                <label>CPF/CNPJ (apenas números):</label>
                <input type="text" id="documento" value="${pessoa.documento}" placeholder="Ex: 12345678900 ou 12345678000190">
                <label>Contato (telefone):</label>
                <input type="text" id="contato" value="${pessoa.contato || ''}" placeholder="Ex: 41999948340">
                <small style="color:#888;">Digite apenas números - o sistema formata automaticamente</small>
            `;
            document.getElementById("modal").style.display = "flex";
        }

        function editarProcesso(id) {
            const proc = dados.processos.find(p => p.id == id);
            currentEditId = id;
            currentModalType = "processo";
            document.getElementById("modalTitle").innerText = "Editar Processo";
            document.getElementById("modalBody").innerHTML = `
                <label>Número do processo:</label>
                <input type="text" id="numero" value="${proc.numero}" placeholder="Número do Processo">
                <label>Cliente:</label>
                <select id="clienteId">${dados.pessoas.map(p => `<option ${p.id==proc.clienteId?"selected":""} value="${p.id}">${p.nome}</option>`).join('')}</select>
                <label>Status:</label>
                <input type="text" id="status" value="${proc.status}" placeholder="Status">
                <label>Descrição:</label>
                <textarea id="descricao" placeholder="Descrição">${proc.descricao}</textarea>
                <hr style="margin:15px 0; border-color:#333;">
                <h4 style="color:#ffd700;">📌 Linha do Tempo</h4>
                <div id="timelineList"></div>
                <label>Adicionar novo evento:</label>
                <input type="date" id="timelineData">
                <input type="text" id="timelineDesc" placeholder="Descrição do evento">
                <button onclick="adicionarTimeline(${id})" style="background:#ffd700; color:#000; border:none; padding:8px; border-radius:6px; cursor:pointer;">+ Adicionar</button>
            `;
            document.getElementById("modal").style.display = "flex";
            renderizarTimelineModal(id);
        }

        function renderizarTimelineModal(processoId) {
            const eventos = dados.timeline.filter(t => t.processoId == processoId);
            let html = '<ul style="list-style:none; padding:0;">';
            eventos.sort((a,b)=>a.data.localeCompare(b.data)).forEach(e => {
                html += `<li style="background:#0a0a0a; padding:8px; margin:5px 0; border-left:3px solid #ffd700; border-radius:4px; color:#ddd;">
                    <strong>${e.data}</strong> - ${e.descricao}
                    <button onclick="excluirTimeline(${e.id})" style="float:right; background:#dc3545; color:white; border:none; border-radius:4px; padding:2px 8px; cursor:pointer;">❌</button>
                </li>`;
            });
            html += '</ul>';
            if(eventos.length === 0) html = '<p style="color:#ddd;">Nenhum evento na linha do tempo ainda.</p>';
            const timelineDiv = document.getElementById("timelineList");
            if(timelineDiv) timelineDiv.innerHTML = html;
        }

        function adicionarTimeline(processoId) {
            const data = document.getElementById("timelineData").value;
            const desc = document.getElementById("timelineDesc").value;
            if(data && desc) {
                const newId = dados.timeline.length > 0 ? Math.max(...dados.timeline.map(t => t.id)) + 1 : 1;
                dados.timeline.push({ id: newId, processoId: processoId, data: data, descricao: desc });
                salvarDados();
                renderizarTimelineModal(processoId);
                document.getElementById("timelineData").value = "";
                document.getElementById("timelineDesc").value = "";
            } else {
                alert("Preencha a data e a descrição do evento!");
            }
        }

        function excluirTimeline(id) {
            if(confirm("Remover este evento da linha do tempo?")) {
                dados.timeline = dados.timeline.filter(t => t.id != id);
                salvarDados();
                if(currentEditId && currentModalType=="processo") renderizarTimelineModal(currentEditId);
            }
        }

        function verTimeline(processoId) {
            const eventos = dados.timeline.filter(t => t.processoId == processoId).sort((a,b)=>a.data.localeCompare(b.data));
            let msg = "📜 LINHA DO TEMPO DO PROCESSO\n\n";
            if(eventos.length === 0) {
                msg += "Nenhum evento registrado ainda.";
            } else {
                eventos.forEach(e => {
                    msg += `${e.data} - ${e.descricao}\n`;
                });
            }
            alert(msg);
        }

        function editarHonorario(id) {
            const honor = dados.honorarios.find(h => h.id == id);
            currentEditId = id;
            currentModalType = "honorario";
            document.getElementById("modalTitle").innerText = "Editar Honorário";
            document.getElementById("modalBody").innerHTML = `
                <label>Cliente:</label>
                <select id="pessoaId">${dados.pessoas.map(p => `<option ${p.id==honor.pessoaId?"selected":""} value="${p.id}">${p.nome}</option>`).join('')}</select>
                <label>Valor Total (R$):</label>
                <input type="number" id="valorTotal" value="${honor.valorTotal}" placeholder="Valor Total">
                <label>Número de Parcelas:</label>
                <input type="number" id="parcelas" value="${honor.parcelas}" placeholder="Número de Parcelas">
                <label>Parcelas Pagas:</label>
                <input type="number" id="parcelasPagas" value="${honor.parcelasPagas}" placeholder="Parcelas Pagas">
                <label>Dia de Vencimento (1-31):</label>
                <input type="number" id="vencimentoDia" value="${honor.vencimentoDia}" placeholder="Dia de Vencimento">
            `;
            document.getElementById("modal").style.display = "flex";
        }

        function excluirPessoa(id) {
            if(confirm("Excluir esta pessoa? TODOS os processos e honorários vinculados também serão removidos!")) {
                dados.pessoas = dados.pessoas.filter(p => p.id != id);
                dados.processos = dados.processos.filter(p => p.clienteId != id);
                dados.honorarios = dados.honorarios.filter(h => h.pessoaId != id);
                salvarDados();
                renderizarTudo();
            }
        }

        function excluirProcesso(id) {
            if(confirm("Excluir este processo? A linha do tempo também será removida!")) {
                dados.processos = dados.processos.filter(p => p.id != id);
                dados.timeline = dados.timeline.filter(t => t.processoId != id);
                salvarDados();
                renderizarTudo();
            }
        }

        function excluirHonorario(id) {
            if(confirm("Excluir este honorário?")) {
                dados.honorarios = dados.honorarios.filter(h => h.id != id);
                salvarDados();
                renderizarTudo();
            }
        }

        function saveModal() {
            if(currentModalType === "pessoa") {
                let nome = document.getElementById("nome").value;
                let tipo = document.getElementById("tipo").value;
                let documento = document.getElementById("documento").value;
                let contato = document.getElementById("contato").value;
                
                if(!nome || !documento) {
                    alert("Preencha o nome e o documento!");
                    return;
                }
                
                // Remove caracteres não numéricos antes de salvar
                documento = documento.replace(/\D/g, '');
                contato = contato ? contato.replace(/\D/g, '') : '';
                
                if(currentEditId) {
                    const idx = dados.pessoas.findIndex(p => p.id == currentEditId);
                    dados.pessoas[idx] = { ...dados.pessoas[idx], nome, tipo, documento, contato };
                } else {
                    const newId = dados.pessoas.length > 0 ? Math.max(...dados.pessoas.map(p => p.id)) + 1 : 1;
                    dados.pessoas.push({ id: newId, nome, tipo, documento, contato });
                }
                salvarDados();
                renderizarPessoas();
            } 
            else if(currentModalType === "processo") {
                const numero = document.getElementById("numero").value;
                const clienteId = parseInt(document.getElementById("clienteId").value);
                const status = document.getElementById("status").value;
                const descricao = document.getElementById("descricao").value;
                
                if(!numero || !clienteId) {
                    alert("Preencha o número do processo e selecione um cliente!");
                    return;
                }
                
                if(currentEditId) {
                    const idx = dados.processos.findIndex(p => p.id == currentEditId);
                    dados.processos[idx] = { ...dados.processos[idx], numero, clienteId, status, descricao };
                } else {
                    const newId = dados.processos.length > 0 ? Math.max(...dados.processos.map(p => p.id)) + 1 : 1;
                    dados.processos.push({ id: newId, numero, clienteId, status, descricao });
                }
                salvarDados();
                renderizarProcessos();
            } 
            else if(currentModalType === "honorario") {
                const pessoaId = parseInt(document.getElementById("pessoaId").value);
                const valorTotal = parseFloat(document.getElementById("valorTotal").value);
                const parcelas = parseInt(document.getElementById("parcelas").value);
                const parcelasPagas = parseInt(document.getElementById("parcelasPagas").value);
                const vencimentoDia = parseInt(document.getElementById("vencimentoDia").value);
                
                if(!pessoaId || !valorTotal || !parcelas || !vencimentoDia) {
                    alert("Preencha todos os campos!");
                    return;
                }
                
                if(currentEditId) {
                    const idx = dados.honorarios.findIndex(h => h.id == currentEditId);
                    dados.honorarios[idx] = { ...dados.honorarios[idx], pessoaId, valorTotal, parcelas, parcelasPagas, vencimentoDia };
                } else {
                    const newId = dados.honorarios.length > 0 ? Math.max(...dados.honorarios.map(h => h.id)) + 1 : 1;
                    dados.honorarios.push({ id: newId, pessoaId, valorTotal, parcelas, parcelasPagas, vencimentoDia });
                }
                salvarDados();
                renderizarHonorarios();
            }
            
            closeModal();
            renderizarVencimentos();
        }

        function openModal(type) {
            currentEditId = null;
            currentModalType = type;
            
            if(dados.pessoas.length === 0 && (type === "processo" || type === "honorario")) {
                alert("Antes de cadastrar um processo ou honorário, cadastre pelo menos uma pessoa!");
                return;
            }
            
            if(type === "pessoa") {
                document.getElementById("modalTitle").innerText = "➕ Nova Pessoa";
                document.getElementById("modalBody").innerHTML = `
                    <label>Nome completo:</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva">
                    <label>Tipo:</label>
                    <select id="tipo"><option>Física</option><option>Jurídica</option></select>
                    <label>CPF/CNPJ (apenas números):</label>
                    <input type="text" id="documento" placeholder="Ex: 12345678900 ou 12345678000190">
                    <label>Contato (telefone):</label>
                    <input type="text" id="contato" placeholder="Ex: 41999948340">
                    <small style="color:#888;">Digite apenas números - o sistema formata automaticamente</small>
                `;
            } else if(type === "processo") {
                document.getElementById("modalTitle").innerText = "➕ Novo Processo";
                document.getElementById("modalBody").innerHTML = `
                    <label>Número do processo:</label>
                    <input type="text" id="numero" placeholder="Ex: 1234/2024">
                    <label>Cliente:</label>
                    <select id="clienteId">${dados.pessoas.map(p => `<option value="${p.id}">${p.nome}</option>`).join('')}</select>
                    <label>Status:</label>
                    <input type="text" id="status" placeholder="Ex: Em andamento, Arquivado...">
                    <label>Descrição:</label>
                    <textarea id="descricao" placeholder="Descrição do processo"></textarea>
                `;
            } else if(type === "honorario") {
                document.getElementById("modalTitle").innerText = "💰 Lançar Honorário";
                document.getElementById("modalBody").innerHTML = `
                    <label>Cliente:</label>
                    <select id="pessoaId">${dados.pessoas.map(p => `<option value="${p.id}">${p.nome}</option>`).join('')}</select>
                    <label>Valor Total (R$):</label>
                    <input type="number" id="valorTotal" placeholder="Ex: 5000">
                    <label>Número de Parcelas:</label>
                    <input type="number" id="parcelas" placeholder="Ex: 10">
                    <label>Parcelas Pagas:</label>
                    <input type="number" id="parcelasPagas" value="0" placeholder="Ex: 3">
                    <label>Dia de Vencimento (1-31):</label>
                    <input type="number" id="vencimentoDia" placeholder="Ex: 27">
                `;
            }
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
            currentEditId = null;
        }

        function searchPessoas() {
            const termo = document.getElementById("searchPessoas").value;
            renderizarPessoas(termo);
        }

        function searchProcessos() {
            const termo = document.getElementById("searchProcessos").value;
            renderizarProcessos(termo);
        }

        function searchHonorarios() {
            const termo = document.getElementById("searchHonorarios").value;
            renderizarHonorarios(termo);
        }
    </script>
</body>
</html>
